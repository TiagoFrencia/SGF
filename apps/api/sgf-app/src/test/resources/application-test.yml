spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///sgf_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

sgf:
  security:
    jwt:
      secret: test-secret-key-for-integration-tests-must-be-long-enough
      expiration-ms: 3600000

logging:
  level:
    com.sgf: DEBUG
    org.springframework.security: DEBUG
