spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    issuer: sgf-api-test
    expiration-minutes: 60
    secret: test-secret-key-for-integration-tests-must-be-long-enough
  background-jobs:
    enabled: false

logging:
  level:
    com.sgf: DEBUG
    org.springframework.security: DEBUG
