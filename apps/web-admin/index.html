<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGF Admin</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h1>SGF</h1>
      <p>Fase 1 ejecutable</p>
      <div class="status-card">
        <span>API</span>
        <strong id="api-status">No autenticado</strong>
      </div>
      <div class="status-card">
        <span>Usuario</span>
        <strong id="current-user">-</strong>
      </div>
    </aside>

    <main class="content">
      <section class="panel">
        <h2>1. Login</h2>
        <form id="login-form" class="grid">
          <label>
            Usuario
            <input name="username" value="admin" required>
          </label>
          <label>
            Password
            <input name="password" type="password" value="admin1234" required>
          </label>
          <button type="submit">Autenticar</button>
        </form>
      </section>

      <section class="panel">
        <h2>2. Alta de producto</h2>
        <form id="product-form" class="grid two-cols">
          <label>GTIN<input name="gtin" value="07791234567890" required></label>
          <label>SKU<input name="sku" value="AMOX-500" required></label>
          <label>Nombre comercial<input name="commercialName" value="Amoxicilina 500mg" required></label>
          <label>Marca<input name="brand" value="Genfar"></label>
          <label>Principio activo<input name="activeIngredient" value="Amoxicilina"></label>
          <label>Presentacion<input name="presentationDescription" value="Caja x 16 capsulas" required></label>
          <label>Concentracion<input name="concentration" value="500mg"></label>
          <label>Forma<input name="form" value="Capsula"></label>
          <label>Unidades por envase<input name="unitsPerPackage" type="number" value="16" min="1"></label>
          <label class="checkbox"><input name="prescriptionRequired" type="checkbox" checked> Requiere receta</label>
          <button type="submit">Crear producto</button>
        </form>
      </section>

      <section class="panel">
        <h2>3. Ingreso de stock</h2>
        <form id="receipt-form" class="grid two-cols">
          <label>Product ID<input name="productId" required></label>
          <label>Lote<input name="lotNumber" value="L-2026-001" required></label>
          <label>Vencimiento<input name="expiresAt" type="date" required></label>
          <label>Cantidad<input name="quantity" type="number" value="40" min="1" required></label>
          <label>Costo unitario<input name="unitCost" type="number" step="0.01" value="1400" required></label>
          <button type="submit">Registrar ingreso</button>
        </form>
      </section>

      <section class="panel">
        <h2>4. Venta simple</h2>
        <form id="sale-form" class="grid two-cols">
          <label>Product ID<input name="productId" required></label>
          <label>Idempotency Key<input name="idempotencyKey" value="sale-demo-001" required></label>
          <label>Cantidad<input name="quantity" type="number" value="2" min="1" required></label>
          <label>Precio unitario<input name="unitPrice" type="number" step="0.01" value="2150" required></label>
          <button type="submit">Procesar venta</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Stock</h2>
          <button id="refresh-stock" type="button">Actualizar</button>
        </div>
        <pre id="stock-output">[]</pre>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Auditoría</h2>
          <button id="refresh-audit" type="button">Actualizar</button>
        </div>
        <pre id="audit-output">[]</pre>
      </section>

      <section class="panel">
        <h2>Log</h2>
        <pre id="log-output">Esperando acciones...</pre>
      </section>
    </main>
  </div>

  <script src="./main.js"></script>
</body>
</html>
