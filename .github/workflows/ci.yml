name: SGF CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: sgf_test
          POSTGRES_USER: sgf
          POSTGRES_PASSWORD: sgf
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Compile
      run: ./gradlew clean build -x test --no-daemon

    - name: Run Unit Tests
      run: ./gradlew test --no-daemon
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sgf_test
        SPRING_DATASOURCE_USERNAME: sgf
        SPRING_DATASOURCE_PASSWORD: sgf

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/build/test-results/test/*.xml'
        retention-days: 7

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v4
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      if: ${{ env.SONAR_TOKEN != '' }}

    - name: Build Docker Image
      run: |
        docker build -t sgf-api:${{ github.sha }} apps/api
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    - name: Push to Registry
      run: |
        echo "Docker image ready for deployment"
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
