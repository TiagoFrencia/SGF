apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgf-api
  namespace: sgf-system
  labels:
    app: sgf-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sgf-api
  template:
    metadata:
      labels:
        app: sgf-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: sgf-api
          image: sgf/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/sgf
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SGF_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sgf-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: sgf-api
  namespace: sgf-system
spec:
  selector:
    app: sgf-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sgf-api-hpa
  namespace: sgf-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sgf-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
