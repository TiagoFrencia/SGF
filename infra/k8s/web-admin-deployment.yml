apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgf-web-admin
  namespace: sgf-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sgf-web-admin
  template:
    metadata:
      labels:
        app: sgf-web-admin
    spec:
      containers:
        - name: web-admin
          image: sgf/web-admin:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: sgf-web-admin
  namespace: sgf-system
spec:
  selector:
    app: sgf-web-admin
  ports:
    - port: 80
