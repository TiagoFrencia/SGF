version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sgf
      - SPRING_DATASOURCE_USERNAME=sgf
      - SPRING_DATASOURCE_PASSWORD=sgf_secure_password_123
      - SGF_SECURITY_JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      - JAVA_OPTS=-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - sgf-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=sgf
      - POSTGRES_USER=sgf
      - POSTGRES_PASSWORD=sgf_secure_password_123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgf -d sgf"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgf-network
    restart: unless-stopped

networks:
  sgf-network:
    driver: bridge

volumes:
  postgres_data:
